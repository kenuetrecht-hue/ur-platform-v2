apiVersion: v1
kind: Namespace
metadata:
  name: ur-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ur-app
  namespace: ur-platform
  labels:
    app: ur-app
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ur-app
  template:
    metadata:
      labels:
        app: ur-app
    spec:
      containers:
      - name: ur-app
        image: ur-platform:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 8081
          name: metro
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ur-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ur-secrets
              key: redis-url
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: ur-app-service
  namespace: ur-platform
  labels:
    app: ur-app
spec:
  type: LoadBalancer
  selector:
    app: ur-app
  ports:
  - name: http
    port: 80
    targetPort: 3000
  - name: metro
    port: 8081
    targetPort: 8081
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ur-app-hpa
  namespace: ur-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ur-app
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 5
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ur-app-config
  namespace: ur-platform
data:
  nginx.conf: |
    upstream ur_app {
      least_conn;
      server ur-app-service:3000 max_fails=3 fail_timeout=30s;
    }
    
    server {
      listen 80;
      server_name _;
      
      client_max_body_size 100M;
      
      location / {
        proxy_pass http://ur_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
      
      location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
      }
    }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ur-app-pdb
  namespace: ur-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ur-app
---
apiVersion: v1
kind: Secret
metadata:
  name: ur-secrets
  namespace: ur-platform
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres-service:5432/ur_db"
  redis-url: "redis://redis-service:6379"
